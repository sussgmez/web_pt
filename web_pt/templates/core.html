<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT | {% block title %}{% endblock title %}</title>

    <!-- Normalize -->
    <link rel="stylesheet" href="{% static "normalize.css" %}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- My Styles -->
    <link rel="stylesheet" href="{% static "style.css" %}"> 
</head>
<body>
    <!-- Header -->
    <header id="page-header">
        <!-- Logo -->
        <a href='{% url "order-list" %}' id="page-logo">
            <img src="{% static "logo.png" %}" alt="pt">
        </a>
        {% if user.is_authenticated %}
        <!-- Navbar -->
        <nav id="header-navbar">
            <a class="nav-option" href="{% url 'order-list' %}">Órdenes de trabajo</a>
            <a class="nav-option" href="{% url 'customer-list' %}">Clientes</a>
            <a class="nav-option" href="{% url 'technician-list' %}">Técnicos</a>
            <a class="nav-option" href="{% url 'logout' %}">Cerrar Sesión</a>
        </nav>
        {% endif %}
    </header>

    <!-- Content -->
    {% block content %}
    {% endblock content %}

</body>
</html>
